version: "3.8"

services:
  db:
    image: postgres:15
    container_name: edvixo-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: edvixo-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - .env

volumes:
  pgdata: