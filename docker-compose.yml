services:
  db:
    image: postgres:15
    container_name: edvixo-db
    restart: always
    environment:
      POSTGRES_DB: edvixo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: edvixo-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    restart: always
    environment:
      DB_URL: jdbc:postgresql://db:5432/edvixo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

volumes:
  pgdata:
    name: edvixo_pgdata